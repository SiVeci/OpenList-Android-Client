name: Android Manual APK

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run unit tests before building signed APKs"
        required: true
        type: boolean
        default: true
      build_arm64_v8a:
        description: "Build arm64-v8a APK, recommended for most modern Android phones"
        required: true
        type: boolean
        default: true
      build_universal:
        description: "Build universal APK for unknown or mixed device architectures"
        required: true
        type: boolean
        default: false
      build_armeabi_v7a:
        description: "Build armeabi-v7a APK for older 32-bit ARM devices"
        required: true
        type: boolean
        default: false
      build_x86:
        description: "Build x86 APK for 32-bit emulators/devices"
        required: true
        type: boolean
        default: false
      build_x86_64:
        description: "Build x86_64 APK for 64-bit emulators/devices"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  signed-apk:
    name: Build signed APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Restore release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Write signing properties
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          test -n "$RELEASE_STORE_PASSWORD"
          test -n "$RELEASE_KEY_ALIAS"
          test -n "$RELEASE_KEY_PASSWORD"
          {
            echo "RELEASE_STORE_FILE=release.keystore"
            echo "RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD"
            echo "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS"
            echo "RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD"
          } > local.properties

      - name: Read app version
        run: |
          VERSION_NAME="$(grep '^appVersionName' gradle/libs.versions.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          VERSION_CODE="$(grep 'versionCode = ' app/build.gradle.kts | head -n 1 | sed -E 's/.*versionCode = ([0-9]+).*/\1/')"
          test -n "$VERSION_NAME"
          test -n "$VERSION_CODE"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=openlist-android-v${VERSION_NAME}-${VERSION_CODE}-signed-apks" >> "$GITHUB_ENV"

      - name: Resolve selected APK types
        run: |
          abi_includes=()
          selected_labels=()
          if [ "${{ inputs.build_arm64_v8a }}" = "true" ]; then
            abi_includes+=("arm64-v8a")
            selected_labels+=("arm64-v8a")
          fi
          if [ "${{ inputs.build_armeabi_v7a }}" = "true" ]; then
            abi_includes+=("armeabi-v7a")
            selected_labels+=("armeabi-v7a")
          fi
          if [ "${{ inputs.build_x86 }}" = "true" ]; then
            abi_includes+=("x86")
            selected_labels+=("x86")
          fi
          if [ "${{ inputs.build_x86_64 }}" = "true" ]; then
            abi_includes+=("x86_64")
            selected_labels+=("x86_64")
          fi
          universal="${{ inputs.build_universal }}"
          if [ "$universal" = "true" ]; then
            selected_labels+=("universal")
          fi
          test "${#selected_labels[@]}" -gt 0

          abi_csv="$(IFS=,; echo "${abi_includes[*]}")"
          labels_csv="$(IFS=,; echo "${selected_labels[*]}")"
          if [ "${#abi_includes[@]}" -gt 0 ]; then
            echo "ENABLE_ABI_SPLITS=true" >> "$GITHUB_ENV"
          else
            echo "ENABLE_ABI_SPLITS=false" >> "$GITHUB_ENV"
          fi
          echo "ABI_INCLUDES=$abi_csv" >> "$GITHUB_ENV"
          echo "UNIVERSAL_APK=$universal" >> "$GITHUB_ENV"
          echo "SELECTED_APK_TYPES=$labels_csv" >> "$GITHUB_ENV"
          echo "Selected APK types: $labels_csv"

      - name: Run unit tests
        if: ${{ inputs.run_tests }}
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build signed release APKs
        run: |
          ./gradlew assembleRelease \
            -Popenlist.enableAbiSplits="${ENABLE_ABI_SPLITS}" \
            -Popenlist.abiIncludes="${ABI_INCLUDES}" \
            -Popenlist.universalApk="${UNIVERSAL_APK}" \
            --stacktrace

      - name: Rename APK outputs
        run: |
          mkdir -p dist/apk
          shopt -s nullglob
          apks=(app/build/outputs/apk/release/*.apk)
          test "${#apks[@]}" -gt 0
          for apk in "${apks[@]}"; do
            base="$(basename "$apk")"
            abi="universal"
            case "$base" in
              *arm64-v8a*) abi="arm64-v8a" ;;
              *armeabi-v7a*) abi="armeabi-v7a" ;;
              *x86_64*) abi="x86_64" ;;
              *x86*) abi="x86" ;;
              *universal*) abi="universal" ;;
            esac
            if [[ ",${SELECTED_APK_TYPES}," != *",${abi},"* ]]; then
              continue
            fi
            cp "$apk" "dist/apk/openlist-android-v${VERSION_NAME}-${abi}.apk"
          done
          test "$(find dist/apk -name '*.apk' | wc -l)" -gt 0
          ls -lh dist/apk

      - name: Verify APK signatures
        run: |
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort | tail -n 1)"
          test -x "$APKSIGNER"
          for apk in dist/apk/*.apk; do
            "$APKSIGNER" verify --print-certs "$apk"
          done

      - name: Upload signed APKs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/apk/*.apk
          if-no-files-found: error
